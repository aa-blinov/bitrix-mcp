[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
strict_optional = False
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Ignore specific files with complex typing or external dependencies
[mypy-bitrix_mcp.client]
ignore_errors = True

[mypy-bitrix_mcp.server]
ignore_errors = True

[mypy-bitrix_mcp.tools.*]
ignore_errors = True
